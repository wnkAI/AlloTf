# Per-scaffold metadata that cannot be derived from the structure database.
#
# atf_structure_db.csv only knows which PDB entries exist (apo / holo / DNA counts and ids). It
# does not know which heteroatom is the real effector, which cofactor the effector needs, where the
# DNA-binding domain ends, or which residues line the pocket - and those decide what gets
# redesigned and what the readout is.
#
# THESE ARE SCIENTIFIC PARAMETERS, NOT DEFAULTS. A scaffold with no entry here is refused rather
# than guessed: inventing a dbd_range would silently redefine the output domain, and inventing
# design_positions would redesign the wrong pocket while still producing confident numbers.

TetR:
  chain: A
  topology_mode: inducible_repressor

  # TAC, not CTC. 2TCT contains 7-chlorotetracycline (CTC); the plain tetracycline complex is
  # 2TRT, WT TetR(D) with TAC and Mg. Running the "tetracycline -> TetR" benchmark on 2TCT would
  # validate a different molecule.
  effector_resname: TAC

  # THE EFFECTOR IS THE Mg COMPLEX, NOT THE FREE DRUG.
  # TetR recognises and is induced by [Mg-tetracycline]+: Mg is coordinated by TAC O11/O12,
  # His100 and waters, and that coordination is what propagates through Thr103 to unwind alpha6.
  # Dropping Mg would make DL/IL "TAC alone", and a failed native control could then mean either a
  # broken six-state theory or simply that we deleted the actual inducer.
  required_cofactors:
    - MG
  # Coordination geometry to preserve when the native states are built.
  cofactor_restraints:
    - [MG, "A/100/NE2"]      # His100 NE2 - Mg
    - [MG, "TAC/O11"]
    - [MG, "TAC/O12"]

  # alpha1-alpha3 three-helix bundle. alpha4 begins at Lys48 and links the DNA-binding domain to
  # the regulatory core, so 48-63 carries allosteric transmission and is NOT pure output.
  dbd_range: [1, 47]

  # TEMPORARY MASK for the first software run only. NOT a verified contact shell: this list mixes
  # ligand-contact residues, positions used in past TetR engineering, and transmission residues
  # that may not touch TAC at all. The real set is resolved from the 2TRT contact shell in Step B
  # and frozen to resolved_design_positions.json before any candidate is ranked.
  design_positions:
    [64, 82, 86, 100, 104, 105, 108, 113, 116, 134, 138]

  # Directly involved in Mg recognition and in triggering induction. Held fixed for the native
  # benchmark so candidate search cannot manufacture negatives by destroying the native Mg
  # mechanism. Reconsider only when designing targets that do not use a metal.
  protected_native_trigger:
    - 100      # His100 - coordinates Mg
    - 103      # Thr103 - relays the coordination change into alpha6

  reference:
    holo: 2TRT               # WT TetR(D) + TAC + Mg  -> induced state X_I
    operator: 1QPI           # WT TetR + tetO         -> DNA-compatible state X_D

  # The first golden benchmark pair, fixed. NOT "all 13 apo / 36 holo": those entries mix
  # anhydrotetracycline, 7-chlorotetracycline, tigecycline, mutant TetR, different constructs and
  # different Mg occupancy. Pooling them would give a sigma that blends structural uncertainty with
  # ligand chemistry, sequence differences and metal occupancy - which is not an ensemble error.
  golden_pair:
    dna_state: 1QPI
    induced_state: 2TRT

LacI:
  chain: A
  topology_mode: inducible_repressor

  effector_resname: IPT          # IPTG as deposited in 1LBH
  required_cofactors: []         # no metal: unlike TetR the inducer acts alone

  # MEASURED, not assumed: residues within 4.5 A of the operator in 1LBG are 5-58
  # (headpiece HTH plus the hinge helix, which inserts into the minor groove). The boundary is set
  # past the last contact so the entire readout - including the hinge - stays out of design.
  dbd_range: [1, 61]

  # design_positions deliberately ABSENT: they are resolved from the effector's contact shell in
  # the holo structure by structure.resolve_design_positions and frozen to
  # resolved_design_positions.json. Nobody should have to know this pocket by heart.

  reference:
    holo: 1LBH                   # LacI + IPTG        -> induced state X_I
    operator: 1LBG               # LacI + operator    -> DNA-compatible state X_D
  golden_pair:
    dna_state: 1LBG
    induced_state: 1LBH

  # KNOWN STRUCTURAL LIMITATION, measured here: 1LBH covers residues 62-357 only. The DNA-binding
  # domain is absent from every IPTG-bound LacI structure because induction disorders it - which is
  # the mechanism itself, not a defect of the deposition. Consequence: the induced backbone has no
  # DBD, so I_DNA cannot be built the way it is for TetR, and the first term of S_release has no
  # structural basis. 1CJG/1L1M/1LCC do not help - they are isolated headpiece fragments (51-62
  # residues) with no effector pocket.
  induced_state_lacks_dbd: true

# Add a scaffold here only with its effector residue name, required cofactors and DBD boundary
# checked against that scaffold's own structures. Pocket residues are resolved automatically.
# QacR, PurR, BmrR, BenM and KstR are Tier-1 and are the obvious next entries.
