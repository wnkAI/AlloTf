# AlloTF V1 scoring. REVISED after GPT-5.6 review.
# Every number here is a RELATIVE proxy on one scaffold. Never report as Kd.

# ---------------------------------------------------------------------------
# Calibration - MANDATORY. Absolute energies are not comparable across structures, operators or
# force-field preparation, so no gate uses a raw zero. Every gate is expressed in units of the
# scaffold's OWN WT controls, scored with the SAME preparation:
# NEGATIVE CONTROLS ARE OPTIONAL IN AVAILABILITY, MANDATORY IN BEHAVIOUR WHEN DECLARED.
#   no literature negative control  -> the scaffold still runs, at a recorded lower validation level
#   a negative control is declared  -> it MUST be rejected by its own diagnostic gate, or STOP
#   WT native system not reproduced -> STOP unconditionally
# Requiring every TF to have known constitutive / non-binding / dead mutants would exclude most
# designable scaffolds; allowing a scaffold to skip calibration entirely would leave the six-state
# energies with nothing to be relative to. Hence: WT mandatory, negatives conditional.
calibration:
  required: true               # never false - see above
  margin_sigma: 1.0            # gate fires at: control_value +/- margin_sigma * sigma(control)

  mandatory_controls:          # missing any of these -> scaffold rejected
    - wt_apo                   # WT, no ligand: the apo / DNA baseline
    - wt_target                # WT protein + the NEW TARGET: the baseline a candidate's binding
                               # and selectivity are judged against. Comparing a candidate's
                               # E_L_I to the NATIVE effector's would compare two different
                               # molecules - size, charge and atom count move Rosetta interface
                               # energy on their own.
    - wt_native_holo           # WT + its NATIVE effector: the scaffold's own working switch.
                               # Judged only on the switch gates (see rank.NATIVE_SWITCH_GATES) -
                               # it is not being retargeted and owes the target nothing.

  optional_validation_controls:   # each names the gate that MUST be the one to catch it
    known_constitutive:
      expected_failure_gate: apo_state_bias
    known_nonbinder:
      expected_failure_gate: target_binding
    known_dna_defective:
      expected_failure_gate: apo_dna_competence
    known_nonresponder:        # replaces the ambiguous "known_dead": a dead mutant may fail to
                               # express, to bind ligand, to bind DNA, to switch, or to release -
                               # those are different gates and cannot all be charged to coupling
      expected_failure_any:
        - coupling
        - ligand_prefers_induced
        - dna_release
        - allosteric_template

  require_all_declared_optional: true   # declared but not caught by its gate -> STOP

  robustness:                  # sign+margin must survive all of these before a candidate is trusted
    # These must match what the code ACTUALLY varies, or the config claims a robustness the
    # pipeline never computed. Today sigma comes from independent structure pairs only; per-pose
    # and per-protonation rescoring are not implemented, so their minima stay at 1 and will be
    # raised when they are.
    min_structure_pairs: 2     # independent experimental X_D / X_I pairs - the real sigma source
    min_poses: 1               # NOT yet a sigma axis: only the top pose is scored
    min_protonation_states: 1  # NOT yet a sigma axis: one protonation state is used
    require_consistent_sign: true   # enforced: ddG_coupling and S_release must not flip sign
                                    # across replicates, or the control is not a stable reference

# ---------------------------------------------------------------------------
# Regulatory topology. Do NOT hard-code the release sign: corepressors (PurR) invert it -
# effector binding STRENGTHENS DNA binding. Route/QC sets this per scaffold.
topology:
  mode: auto     # auto | inducible_repressor (release_sign=+1) | corepressor (release_sign=-1)

# ---------------------------------------------------------------------------
# Hard gates, cheapest and most decisive first.
# fail_closed: a missing feature is a REJECT, never a default-pass.
fail_closed: true

hard_gates:
  # 1. binding must actually happen. Without this, a non-binder (+100 vs +99) passes on
  #    state preference alone.
  target_binding:
    # anchored on WT + THE TARGET, not on the native effector: interface energy scales with
    # molecule size, charge and atom count, so "binds worse than tetracycline" says nothing about
    # whether a candidate binds the new molecule well.
    metric: E_L_I
    max: "wt_target + 1.0*sigma"

  # 2. NOT constitutive. THE fatal omission of the first draft: without an apo-bias gate a mutant
  #    that already prefers X_I with no ligand passes everything else.
  apo_state_bias:
    metric: dG_apo                       # E(C_A_I) - E(C_A_D)
    min: "wt_apo + 1.0*sigma"

  # 3. the ligand must be what shifts the population (linkage, not a by-product)
  coupling:
    metric: ddG_coupling                 # dG_lig - dG_apo
    max: "wt_native_holo - 1.0*sigma"

  # 3b. the LIGAND-BOUND protein must actually prefer the induced state. ddG_coupling<0 alone can be
  #     bought by an apo state that prefers D so strongly the ligand never overcomes it
  #     (D0=0,I0=20,DL=-10,IL=0 -> ddG_coup=-10 yet the holo protein is still 0 REU more stable in
  #     D: a non-switch). Gating dG_lig<0 directly closes it. Found by GPT-5.6.
  ligand_prefers_induced:
    metric: dG_lig                       # E(IL) - E(DL)
    max: "wt_native_holo + 1.0*sigma"

  # 4. apo must still hold the operator (vs WT apo, same operator + preparation)
  apo_dna_competence:
    metric: E_DNA_X_D
    max: "wt_apo + 1.0*sigma"

  # 5. the induced state must let go; sign comes from topology.mode, not hard-coded
  dna_release:
    metric: S_release
    min: "wt_native_holo - 1.0*sigma"
    apply_sign_from_topology: true

  # 6. selectivity is an objective, so it needs a gate
  specificity:
    metric: S_specificity                # E(best decoy) - E(target)
    min: "0.5*sigma"

  # 7. per-state integrity. "clash == 0" is meaningless without a counting convention - compare
  #    to WT after identical repacking instead.
  state_integrity:
    fold_clash:      {metric: clash_count, max: "wt_apo + 2.0*sigma"}
    packing:         {require_all_states_packed: true}
    ligand_strain:   {max: 2.0}
    pose_confidence: {min: 0.5}

  # 8. allosteric template similarity. On IMPOSED backbones this is partly tautological, so it is
  #    used ONLY to reject designs that clearly break the path - never as positive evidence of
  #    coupling.
  #    THE RULER IS WT, NOT A NEGATIVE CONTROL. Anchoring this on known_dead made the threshold
  #    uncomputable for any scaffold without such a mutant, which contradicts negative controls
  #    being optional. WT defines the scale; declared negatives only verify that the scale
  #    actually separates broken variants.
  allosteric_template:
    metric: template_similarity
    min: "wt_native_holo - 2.0*sigma"
    scope: transduction_and_output_only  # the pocket is expected to differ - do not score it

  # NOTE - deliberately NO host-metabolite gate.
  # Generic metabolites (ATP, glucose, NADH) are not a defensible computational decoy set for a
  # hydrophobic effector pocket: there is no competitive-binding hypothesis, and Rosetta energies
  # of highly charged molecules are not comparable to a hydrophobic ligand's, so the difference
  # would not mean what a gate needs it to mean. Failure to dock also says the pose method does not
  # apply, not that the molecule does not bind - gating on it manufactures false negatives.
  # The real question behind metabolites - does the sensor sit ON in the cell - is measured
  # directly and reliably by the fluorescence assay, as basal leak B under the B < B_max
  # constraint. That is where it belongs.

# ---------------------------------------------------------------------------
# Only candidates passing ALL gates reach ranking. Pareto, not a weighted sum: a candidate that
# fails any gate is not a sensor no matter how well it binds.
pareto:
  # These are CANDIDATE FIELD names, not concepts. rank.py reads each key straight off the
  # assembled feature row, so a concept name here (target_binding vs E_L_I) silently drops the
  # objective instead of failing.
  objectives:
    - E_L_I                 # target binding on the induced state
    - ddG_coupling          # linkage: (E_IL-E_DL) - (E_I0-E_D0)
    - S_release             # DNA release, topology sign applied once in rank
    - S_specificity         # target vs best decoy
    - template_similarity   # distal allosteric path preserved

  maximize:
    E_L_I: false            # an interaction energy: lower is better
    ddG_coupling: false     # want < 0
    S_release: true
    S_specificity: true
    template_similarity: true

  weights:                  # tie-break INSIDE the Pareto front only, never a substitute for gates
    ddG_coupling:        0.35
    E_L_I:               0.25
    S_release:           0.20
    S_specificity:       0.15
    template_similarity: 0.05

diversity:
  cluster_identity: 0.9
  max_per_cluster: 3
